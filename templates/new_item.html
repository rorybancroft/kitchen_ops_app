{% extends "base.html" %}

{% block title %}Add Inventory Item{% endblock %}

{% block content %}
<div class="topbar">
  <div class="title-wrap">
    <h1>Add Inventory Item</h1>
    <p>Create a new ingredient or product with the right units, vendor, and reorder settings from the start.</p>
  </div>
  <div class="nav-pills no-print">
    <a class="button" href="{{ url_for('dashboard') }}">Dashboard</a>
    <a class="button" href="{{ url_for('inventory') }}">Inventory</a>
  </div>
</div>

<div class="card" style="max-width:900px;">
  <form method="post">
    <div class="grid-2">
      <label>Name<input name="name" required></label>
      <label>Vendor<input name="vendor"></label>
      <label>Inventory unit (lb, oz, ct, dozen, each, case)<input name="unit" required></label>
      <label>Purchase unit (case, pound, bag, each)<input name="purchase_unit"></label>
      <label>Pack size (ex: 2/5LB, 10LB, 1ga, 3ct)<input name="pack_size"></label>
      <label>Cost per unit<input name="cost_per_unit" type="number" step="0.01" required></label>
      <label>On hand qty<input name="on_hand" type="number" step="0.01" required></label>
      <label>Reorder level<input name="reorder_level" type="number" step="0.01" required></label>
    </div>
    <div class="action-row" style="margin-top:18px;">
      <button class="primary" type="submit">Save Item</button>
    </div>
  </form>
</div>
{% endblock %}
