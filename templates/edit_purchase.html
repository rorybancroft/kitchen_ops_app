{% extends "base.html" %}

{% block title %}Edit Invoice{% endblock %}

{% block content %}
<div class="topbar">
  <div class="title-wrap">
    <h1>Edit Invoice</h1>
    <p>Correct invoice details to keep your purchasing log accurate.</p>
  </div>
  <div class="nav-pills no-print">
    <a class="button" href="{{ url_for('purchases', month=month) }}">Back to Purchases</a>
  </div>
</div>

<div class="card" style="max-width:900px;">
  <form method="POST">
    <div class="grid-2">
      <label>Date<input type="date" name="purchase_date" value="{{ p.purchase_date }}" required></label>
      <label>Supplier / Company<input type="text" name="company" value="{{ p.company }}" required></label>
      <label>Invoice #<input type="text" name="invoice_number" value="{{ p.invoice_number or '' }}"></label>
      <label>PO Number<input type="text" name="po_number" value="{{ p.po_number or '' }}"></label>
      <label>Invoice Total ($)<input type="number" step="0.01" name="invoice_total" value="{{ '%.2f'|format(p.invoice_total) }}" required></label>
    </div>
    <div class="action-row" style="margin-top:18px;">
      <button class="primary" type="submit">Save Changes</button>
    </div>
  </form>
</div>
{% endblock %}
